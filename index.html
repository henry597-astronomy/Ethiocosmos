<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Ethio-Cosmos Learning Community</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }

      // Prevent multi-touch zoom while allowing single-touch scrolling
      document.addEventListener('touchstart', function (event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });

      // Prevent double-tap zoom with better detection
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function (event) {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          // Only prevent if it's truly a double-tap (not a scroll)
          if (event.touches.length === 0) {
            event.preventDefault();
          }
        }
        lastTouchEnd = now;
      }, { passive: false });

      // Zoom akka hingoone
      document.addEventListener('gesturestart', function (event) {
        event.preventDefault();
      }, { passive: false });

      // Optimize touch performance with passive listeners for scroll events
      document.addEventListener('touchmove', function () {}, { passive: true });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
